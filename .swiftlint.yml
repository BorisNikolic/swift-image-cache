disabled_rules:
    - superfluous_disable_command
    - type_body_length

opt_in_rules:
    - shorthand_optional_binding
    - implicit_return
    - empty_count
    - direct_return
    - redundant_type_annotation
    - final_test_case
    - contains_over_filter_count
    - first_where
    - redundant_self_in_closure

line_length:
  warning: 150
  ignores_function_declarations: true
  ignores_comments: true
  ignores_interpolated_strings: true
  ignores_urls: true

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 12
  error: 20
  ignores_case_statements: false

function_parameter_count:
  warning: 6
  error: 8

empty_count:
  severity: warning

included:
  - Sources
  - ExampleApp/ExampleApp
  - Tests

excluded:
  - .build
  - Pods

type_name:
  min_length: 3
  max_length: 40
  excluded:
    - '^T$'

identifier_name:
  min_length: 3
  max_length: 50
  excluded:
    - '^i$'
    - '^id$'
    - '^to$'
    - '^url$'
